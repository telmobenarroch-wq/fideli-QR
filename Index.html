<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fidélité QR — Les Bucheron Barber</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --accent: #c9a84c;
      --accent-dim: #a8893a;
      --text: #f0ede8;
      --text-muted: #888;
      --danger: #e05252;
      --success: #52c98a;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid #2a2a2a;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 42px; height: 42px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: #0f0f0f;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--accent);
      line-height: 1;
    }

    header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── LAYOUT ── */
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 14px;
      text-align: center;
      border: 1px solid #2a2a2a;
    }

    .stat-card .num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      color: var(--accent);
      line-height: 1;
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid #2a2a2a;
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .card-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .card-body { padding: 20px; }

    /* ── FORM ── */
    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: #555; }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: #0f0f0f;
    }

    .btn-primary:hover { background: var(--accent-dim); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid #333;
      margin-top: 8px;
    }

    .btn-secondary:hover { background: #2e2e2e; }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      margin-top: 8px;
    }

    .btn-danger:hover { background: rgba(224,82,82,0.08); }

    /* ── CLIENT RESULT ── */
    #client-result { margin-top: 16px; }

    .client-card {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 18px;
      border: 1px solid #2e2e2e;
    }

    .client-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.5px;
      color: var(--text);
      margin-bottom: 14px;
    }

    /* ── PROGRESS BAR ── */
    .points-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .points-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .points-count span {
      color: var(--accent);
      font-weight: 600;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #e8c87a);
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .reward-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-row .btn {
      font-size: 13px;
      padding: 11px;
    }

    /* ── CLIENT LIST ── */
    .client-list { display: flex; flex-direction: column; gap: 8px; }

    .client-item {
      background: var(--surface2);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #2e2e2e;
      transition: border-color 0.2s;
    }

    .client-item:hover { border-color: #3a3a3a; }

    .client-item-name {
      font-size: 14px;
      font-weight: 500;
    }

    .client-item-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .pts-pill {
      background: rgba(201,168,76,0.12);
      color: var(--accent);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .pts-pill.full {
      background: rgba(82,201,138,0.12);
      color: var(--success);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
      max-width: 90vw;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-icon { font-size: 32px; margin-bottom: 10px; }

    /* ── LOADING ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">LB</div>
  <div>
    <h1>Les Bucheron Barber</h1>
    <p>Gestion fidélité client</p>
  </div>
</header>

<main>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="num" id="stat-total">—</div>
      <div class="label">Clients</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-active">—</div>
      <div class="label">Actifs</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-rewards">—</div>
      <div class="label">Récompenses</div>
    </div>
  </div>

  <!-- RECHERCHE CLIENT -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🔍</div>
      <h2>Rechercher un client</h2>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Téléphone ou nom</label>
        <input type="text" id="search-input" placeholder="Ex: 06 12 34 56 78" />
      </div>
      <button class="btn btn-primary" onclick="searchClient()">Rechercher</button>

      <div id="client-result"></div>
    </div>
  </div>

  <!-- NOUVEAU CLIENT -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">➕</div>
      <h2>Nouveau client</h2>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Prénom & Nom</label>
        <input type="text" id="new-name" placeholder="Ex: Thomas Martin" />
      </div>
      <div class="field">
        <label>Téléphone</label>
        <input type="tel" id="new-phone" placeholder="Ex: 06 12 34 56 78" />
      </div>
      <button class="btn btn-primary" onclick="addClient()">Créer le client</button>
    </div>
  </div>

  <!-- LISTE CLIENTS -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👥</div>
      <h2>Tous les clients</h2>
    </div>
    <div class="card-body" style="padding: 12px;">
      <div id="client-list"><div class="spinner"></div></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  const SUPABASE_URL = "https://lazypkcbrlffdzzv dhxh.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxhenlwa2NicmxmZmR6enZkaHhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTI3NzEsImV4cCI6MjA5MjYyODc3MX0.kv5IegbT6HiXxkdDOXhyDC14zXaEb_9tjTAd-cIZccw";
  const COMMERCE_ID = "b61071ca-7ab7-4095-af40-2cefab21b1ad";
  const POINTS_MAX = 10;

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentClient = null;

  // ── TOAST ──
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 3000);
  }

  // ── STATS ──
  async function loadStats() {
    const { data } = await db.from('clients').select('id, points').eq('commerce_id', COMMERCE_ID);
    if (!data) return;
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('stat-active').textContent = data.filter(c => c.points > 0).length;
    document.getElementById('stat-rewards').textContent = data.filter(c => c.points >= POINTS_MAX).length;
  }

  // ── LOAD LIST ──
  async function loadClients() {
    const { data, error } = await db.from('clients').select('*').eq('commerce_id', COMMERCE_ID).order('created_at', { ascending: false });
    const el = document.getElementById('client-list');

    if (error || !data || data.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">✂️</div>Aucun client encore</div>`;
      return;
    }

    el.innerHTML = `<div class="client-list">${data.map(c => {
      const full = c.points >= POINTS_MAX;
      return `<div class="client-item">
        <div>
          <div class="client-item-name">${c.nom}</div>
          <div class="client-item-sub">${c.telephone || 'Pas de tél.'}</div>
        </div>
        <div class="pts-pill ${full ? 'full' : ''}">${full ? '🎁 Récompense' : c.points + ' pts'}</div>
      </div>`;
    }).join('')}</div>`;
  }

  // ── SEARCH ──
  async function searchClient() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) { toast('Saisis un nom ou un téléphone', 'error'); return; }

    const { data, error } = await db.from('clients').select('*')
      .eq('commerce_id', COMMERCE_ID)
      .or(`nom.ilike.%${query}%,telephone.ilike.%${query}%`)
      .limit(1).single();

    const el = document.getElementById('client-result');

    if (error || !data) {
      el.innerHTML = `<div class="empty" style="padding:20px 0"><div class="empty-icon">🤷</div>Client introuvable</div>`;
      return;
    }

    currentClient = data;
    renderClientCard(data, el);
  }

  function renderClientCard(c, container) {
    const pct = Math.min((c.points / POINTS_MAX) * 100, 100);
    const full = c.points >= POINTS_MAX;

    container.innerHTML = `
      <div class="client-card">
        <div class="client-name">${c.nom}</div>
        ${full ? `<div class="reward-badge">🎁 Récompense disponible !</div>` : ''}
        <div class="points-row">
          <div class="points-count"><span>${c.points}</span> / ${POINTS_MAX} points</div>
          <div style="font-size:12px;color:var(--text-muted)">${pct.toFixed(0)}%</div>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="addPoint()">+1 Point ✂️</button>
          ${full ? `<button class="btn btn-danger" onclick="redeemReward()">Utiliser 🎁</button>` : `<button class="btn btn-secondary" style="margin:0" onclick="removePoint()">−1 Point</button>`}
        </div>
      </div>`;
  }

  // ── ADD POINT ──
  async function addPoint() {
    if (!currentClient) return;
    const newPts = currentClient.points + 1;
    const { error } = await db.from('clients').update({ points: newPts }).eq('id', currentClient.id);
    if (error) { toast('Erreur lors de la mise à jour', 'error'); return; }
    currentClient.points = newPts;
    renderClientCard(currentClient, document.getElementById('client-result'));
    loadStats(); loadClients();
    toast(`+1 point pour ${currentClient.nom} 🎉`);
  }

  // ── REMOVE POINT ──
  async function removePoint() {
    if (!currentClient || currentClient.points <= 0) return;
    const newPts = currentClient.points - 1;
    const { error } = await db.from('clients').update({ points: newPts }).eq('id', currentClient.id);
    if (error) { toast('Erreur', 'error'); return; }
    currentClient.points = newPts;
    renderClientCard(currentClient, document.getElementById('client-result'));
    loadStats(); loadClients();
    toast(`Point retiré`, 'error');
  }

  // ── REDEEM ──
  async function redeemReward() {
    if (!currentClient) return;
    const { error } = await db.from('clients').update({ points: 0 }).eq('id', currentClient.id);
    if (error) { toast('Erreur', 'error'); return; }
    currentClient.points = 0;
    renderClientCard(currentClient, document.getElementById('client-result'));
    loadStats(); loadClients();
    toast(`Récompense utilisée pour ${currentClient.nom} 🎁`);
  }

  // ── ADD CLIENT ──
  async function addClient() {
    const nom = document.getElementById('new-name').value.trim();
    const telephone = document.getElementById('new-phone').value.trim();
    if (!nom) { toast('Saisis un nom', 'error'); return; }

    const { error } = await db.from('clients').insert({ nom, telephone, commerce_id: COMMERCE_ID, points: 0 });
    if (error) { toast('Erreur lors de la création', 'error'); return; }

    document.getElementById('new-name').value = '';
    document.getElementById('new-phone').value = '';
    toast(`${nom} ajouté ✅`);
    loadStats(); loadClients();
  }

  // ── ENTER KEY ──
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchClient();
  });

  // ── INIT ──
  loadStats();
  loadClients();
</script>
</body>
</html>
